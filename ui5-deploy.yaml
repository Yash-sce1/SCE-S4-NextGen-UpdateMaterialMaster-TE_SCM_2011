# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: com.sce.materialmaster
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: development_S32_110
          url: http://s4dev.sap.sce.com:443
          client: '110'
        app:
          name: ZMM_T1_MATMAST
          package: ZMM_T1
          transport: S32K904766
        exclude:
          - /test/
